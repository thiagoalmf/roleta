<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta Controlada</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            padding: 10px;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }

        /* 1) Ajuste de tamanho: Ocupa quase toda a tela disponível */
        .roleta-container {
            position: relative;
            /* Usa a menor dimensão da tela (largura ou altura) para garantir que permaneça redonda e grande */
            width: 75vmin; 
            height: 75vmin;
            max-width: 650px; /* Limite máximo para não estourar em monitores gigantes */
            max-height: 650px;
        }

        /* Indicador / Seta da Roleta */
        .seta {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #333;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); 
        }

        .botoes-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            justify-content: center;
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-girar {
            background-color: #28a745;
        }

        .btn-girar:hover {
            background-color: #218838;
        }

        .btn-reiniciar {
            background-color: #dc3545;
        }

        .btn-reiniciar:hover {
            background-color: #c82333;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="roleta-container">
        <div class="seta"></div>
        <!-- Mantemos a resolução interna alta para o desenho não pixelar ao expandir -->
        <canvas id="roleta" width="800" height="800"></canvas>
    </div>

    <div class="botoes-container">
        <button id="btnGirar" class="btn-girar" onclick="girarRoleta()">Girar</button>
        <button class="btn-reiniciar" onclick="reiniciarProcesso()">Reiniciar</button>
    </div>

    <script>
        const canvas = document.getElementById('roleta');
        const ctx = canvas.getContext('2d');
        const btnGirar = document.getElementById('btnGirar');

        // Lista de cores com os códigos hexadecimais exatos solicitados
        const cores = [
            '#FF5733', // 0: Vermelho
            '#33FF57', // 1: Verde
            '#272194', // 2: Azul Escuro (Alterado para #272194)
            '#F3FF33', // 3: Amarelo
            '#FF33F3', // 4: Rosa
            '#33FFF3', // 5: Azul Claro
            '#8B4513', // 6: Marrom
            '#5D0C61', // 7: Roxo (Alterado para #5D0C61)
            '#808080'  // 8: Cinza
        ];

        const numOpcoes = cores.length;
        const arco = 2 * Math.PI / numOpcoes;
        
        let contadorCliques = 0;
        let emMovimento = false;
        let 'rotacaoAtual' = 0;

        // Desenha a roleta baseada na resolução interna expandida (800x800)
        function desenharRoleta() {
            ctx.clearRect(0, 0, 800, 800);
            for (let i = 0; i < numOpcoes; i++) {
                ctx.beginPath();
                ctx.fillStyle = cores[i];
                ctx.moveTo(400, 400);
                ctx.arc(400, 400, 400, i * arco, (i + 1) * arco);
                ctx.lineTo(400, 400);
                ctx.fill();
            }
        }

        function girarRoleta() {
            if (emMovimento) return;
            emMovimento = true;
            btnGirar.disabled = true;

            contadorCliques++;
            let indiceVencedor = 0;

            // Sequência de vitórias mantida
            if (contadorCliques === 1) {
                indiceVencedor = 3; // Amarelo
            } else if (contadorCliques === 2) {
                indiceVencedor = 2; // Azul Escuro (#272194)
            } else if (contadorCliques === 3) {
                indiceVencedor = 7; // Roxo (#5D0C61)
            } else {
                indiceVencedor = Math.floor(Math.random() * numOpcoes);
            }

            const anguloPorOpcao = 360 / numOpcoes;
            const anguloDestino = 270 - (indiceVencedor * anguloPorOpcao) - (anguloPorOpcao / 2);
            
            const ajusteAngulo = anguloDestino < 0 ? anguloDestino + 360 : anguloDestino;
            const voltasCompletas = 5 * 360;
            
            const sobraAtual = 'rotacaoAtual' % 360;
            'rotacaoAtual' += voltasCompletas + (ajusteAngulo - sobraAtual);
            if (ajusteAngulo < sobraAtual) {
                'rotacaoAtual' += 360;
            }

            canvas.style.transform = `rotate(${'rotacaoAtual'}deg)`;

            setTimeout(() => {
                emMovimento = false;
                btnGirar.disabled = false;
            }, 4000);
        }

        function reiniciarProcesso() {
            if (emMovimento) return;
            
            contadorCliques = 0;
            'rotacaoAtual' = 0;
            canvas.style.transform = `rotate(0deg)`;
            btnGirar.disabled = false;
        }

        desenharRoleta();
    </script>
</body>
</html>
